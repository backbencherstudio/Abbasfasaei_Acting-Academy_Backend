<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Tester — Acting Academy</title>
    <meta name="description" content="Chat testing page for Acting Academy backend API and WebSocket validation." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="chat_style.css" />
  </head>
  <body>
    <div id="app">
      <!-- AUTH SCREEN -->
      <div id="auth-screen" class="auth-screen">
        <div class="auth-card">
          <div class="auth-logo">💬</div>
          <h1>Chat Tester</h1>
          <p class="auth-sub">Login to test the full chat system</p>
          <div id="auth-token">
            <textarea id="jwt-token" placeholder="Paste your JWT token here..." rows="4" style="width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 0.75rem 1rem; color: #e4e6eb; margin-bottom: 0.75rem; font-family: monospace; resize: vertical; outline: none;"></textarea>
            <button id="connect-btn" class="btn-primary">Connect</button>
          </div>
          <div id="auth-msg" class="auth-msg hidden"></div>
        </div>
      </div>

      <!-- CHAT SCREEN -->
      <div id="chat-screen" class="chat-screen hidden">
        <!-- SIDEBAR -->
        <aside id="sidebar" class="sidebar">
          <div class="sidebar-top">
            <h2>Chats</h2>
            <div class="sidebar-actions">
              <button id="btn-new-dm" title="New DM">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
              </button>
              <button id="btn-new-group" title="New Group">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2m22-4l-5 5m0-5l5 5"/></svg>
              </button>
            </div>
          </div>
          <div class="sidebar-search">
            <input type="text" id="search-input" placeholder="Search users (discover)..." />
            <div id="search-results" class="search-results hidden"></div>
          </div>
          <ul id="conv-list" class="conv-list"></ul>
          <div class="sidebar-footer">
            <span id="current-user-info"></span>
            <button id="btn-logout" class="btn-sm">Logout</button>
          </div>
        </aside>

        <!-- MAIN CHAT AREA -->
        <main id="chat-main" class="chat-main">
          <div id="chat-empty" class="chat-empty">
            <div class="chat-empty-icon">💬</div>
            <h3>Select a conversation</h3>
            <p>Or create a new DM / Group to get started</p>
          </div>

          <div id="chat-active" class="chat-active hidden">
            <!-- Header -->
            <div class="chat-header">
              <button id="btn-back" class="btn-back">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
              </button>
              <div class="chat-header-info">
                <h3 id="chat-title">Chat</h3>
                <span id="chat-status" class="chat-status"></span>
              </div>
              <div class="chat-header-actions">
                <button id="btn-members" title="Members" class="hidden">
                  <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                </button>
              </div>
            </div>

            <!-- Messages -->
            <div id="messages" class="messages"></div>

            <!-- Typing indicator -->
            <div id="typing-bar" class="typing-bar hidden">
              <span id="typing-text"></span>
            </div>

            <!-- Input -->
            <div class="chat-input-area">
              <div id="attach-preview" class="attach-preview hidden"></div>
              <div class="chat-input-row">
                <button id="btn-attach" title="Attach file">
                  <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.44 11.05l-8.49 8.49a5 5 0 01-7.07-7.07l9.2-9.19a3.5 3.5 0 114.95 4.95l-9.2 9.19a2 2 0 11-2.83-2.83l8.49-8.49"/></svg>
                </button>
                <input type="file" id="file-input" multiple hidden accept="image/*,video/*,.pdf,.doc,.docx,.txt,.zip,.rar" />
                <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off" />
                <button id="btn-send" class="btn-send" title="Send">
                  <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
              </div>
            </div>
          </div>
        </main>

        <!-- EVENT LOG PANEL -->
        <aside id="log-panel" class="log-panel">
          <div class="log-header">
            <h3>Event Log</h3>
            <button id="btn-clear-log" class="btn-sm">Clear</button>
          </div>
          <div id="log-entries" class="log-entries"></div>
        </aside>
      </div>

      <!-- MODAL -->
      <div id="modal" class="modal hidden">
        <div class="modal-card">
          <div class="modal-header">
            <h3 id="modal-title">Modal</h3>
            <button id="modal-close">&times;</button>
          </div>
          <div id="modal-body" class="modal-body"></div>
          <div class="modal-footer">
            <button id="modal-cancel" class="btn-secondary">Cancel</button>
            <button id="modal-ok" class="btn-primary">OK</button>
          </div>
        </div>
      </div>
    </div>
    <script src="chat_script.js"></script>
  </body>
</html>
